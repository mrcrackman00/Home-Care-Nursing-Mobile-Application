name: homecare_app
description: "Home Care Nursing - Book nurses on demand"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4
  
  # Maps (Free - OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # State Management
  provider: ^6.1.2
  
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  badges: ^3.1.2
  
  # Payment
  razorpay_flutter: ^1.4.3
  
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  http: ^1.2.2
  timeago: ^3.7.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
